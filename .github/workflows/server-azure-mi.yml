# Builds and pushes a Docker image of the server module to the fork's GHCR
# namespace, tagged with a custom tag. Skips Trivy and Sonar.

name: Server Azure-MI image

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Tag for the published image"
        required: true
        default: "azure-mi-v1"
  push:
    branches:
      - "feat/azure-workload-identity"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up build environment
        uses: ./.github/actions/setup-build-tools
        with:
          java: "true"
          bun: "true"

      - name: Build server artifacts (no Jib)
        working-directory: server
        run: |
          mvn --batch-mode package -DskipTests -DskipITs
          mvn --batch-mode dependency:copy-dependencies \
            -DincludeScope=runtime \
            -DoutputDirectory=target/dependency
        timeout-minutes: 60

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pathling:${{ inputs.image-tag || 'azure-mi-v1' }}
          provenance: false
